[package]
name = "dicom-deid-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
dicom-object = "0.8"
dicom-core = "0.8"
dicom-dictionary-std = "0.8"
dicom-pixeldata = { version = "0.8", default-features = false, features = ["native"] }
sha2 = "0.10"
regex = "1"
thiserror = "2"
chrono = "0.4"
indicatif = "0.17"

[features]
default = []
jpeg2000 = ["dicom-pixeldata/openjpeg-sys"]

[dev-dependencies]
tempfile = "3"
